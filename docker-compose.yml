version: '3.8'
services:
    db:
        image: postgres:15
        environment:
            POSTGRES_DB: ${DB_NAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_USER: ${DB_USER}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
            interval: 5s
            timeout: 5s
            retries: 5
            start_period: 10s           
    web:
        build: .
        volumes:
            - .:/app
        ports:
            - '8000:8000'
        environment:
            - DEBUG=${DEBUG}
            - POSTGRES_DB=${DB_NAME}
            - POSTGRES_PASSWORD=${DB_PASSWORD}
            - POSTGRES_USER=${DB_USER}
            - DB_HOST=db
            - DB_PORT=5432

        env_file:
            - .env
        depends_on:
            db:
                condition: service_healthy


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{task.title}}</title>
</head>
<body>
    <h1>Название:</h1>
    {{task.title}}

    <h1>Описание:</h1>
    {{task.description}}

    <p>Выполнено: {% if task.completed %}✅ {%else%}❌{%endif%}</p>

    <a href="{% url 'task_edit' task.id%}">Изменить задачу</a>
    <a href="{% url 'task_delete' task.id%}">Удалить задачу</a>
    <a href="{% url 'task_list' %}">Вернутся обратно</a>
</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список задач</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{% static 'css/task_listc.css' %}">
</head>


<body>
    <div class="square"><h1 class="text">Список задач</h1>
    <a href="{% url 'task_create' %}" class="task_create">+</a></div>
    
    {% if tasks %}
        
        {% for t in tasks %}
        <div class="task_div">
        <a href="{% url 'task_detail' t.id%}"><h3 class="task_text">{{t.title}}</h3></a>
        <p class="text">Статус:{% if t.completed %}✅ {% else %}❌{%endif%}</p>
        </div>
        {%endfor%}
        

    {%else%}
        <div>
        <h1 class="none">Задач пока нет</h1>
        </div>
    {% endif %}

</body>
</html>
